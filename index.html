function simulateMothershipHit() {

    }
}


        function updateCanvasMetrics() {
            gameWidth = canvas.width;
            gameHeight = canvas.height;
            shieldSpacing = (gameWidth - (shieldCount * shieldWidth)) / (shieldCount + 1);
        }

        function syncGameTimers() {
            const now = Date.now();
            lastUpdateTime = now;
            lastStepTime = now;
            lastInvaderSoundTime = now;

            if (animationFrameId === null && !gameOver) {

        function pauseActiveMothershipSounds() {
            motherships.forEach(mothership => {
                if (mothership.alive) {
                    mothership.sound.pause();
                }
            });
        }

        function resumeActiveMothershipSounds() {
            motherships.forEach(mothership => {
                if (mothership.alive) {
                    mothership.sound.play().catch(() => {});
                }
            });
        }

        function stopActiveMothershipSounds() {
            motherships.forEach(mothership => {
                mothership.sound.pause();
                mothership.sound.currentTime = 0;
            });
        }

        function layoutShields() {
            const shieldY = gameHeight - playerHeight - shieldHeight - 50;
            shields.forEach((shield, index) => {
                shield.x = shieldSpacing + index * (shieldWidth + shieldSpacing);
                shield.y = shieldY;
                shield.width = shieldWidth;
                shield.height = shieldHeight;
            });
        }

        function getPlayerSpawnPosition() {
            const middleShield = shields[Math.floor(shields.length / 2)];
            const spawnX = middleShield
                ? middleShield.x + middleShield.width / 2 - playerWidth / 2
                : gameWidth / 2 - playerWidth / 2;
            const spawnY = middleShield
                ? middleShield.y + shieldHeight + 40
                : gameHeight - playerHeight - 40;

            return {
                x: Math.min(Math.max(spawnX, 0), Math.max(0, gameWidth - playerWidth)),
                y: Math.min(spawnY, Math.max(0, gameHeight - playerHeight - 10))
            };
        }

        function placePlayerAtSpawn() {
            if (!player) return;

            const spawn = getPlayerSpawnPosition();
            player.x = spawn.x;
            player.y = spawn.y;
            player.width = playerWidth;
            player.height = playerHeight;
        }

        function clampPlayerToCanvas() {
            if (!player) return;

            player.x = Math.min(Math.max(player.x, 0), Math.max(0, gameWidth - player.width));
            player.y = Math.min(player.y, Math.max(0, gameHeight - player.height - 10));
        }

        function getAliveEnemies() {
            return enemies.filter(enemy => enemy.alive);
        }

        function calculateEnemyStepDelay() {
            const remainingEnemies = getAliveEnemies().length;
            if (remainingEnemies === 0) {
                return Infinity;
            }

            const effectiveAlienCount = Math.min(remainingEnemies, ARCADE_STARTING_ALIEN_COUNT);
            return (effectiveAlienCount / ARCADE_INTERRUPT_HZ) * 1000;
        }

        function getEnemyHorizontalStep() {
            const scaleX = gameWidth / ARCADE_SCREEN_WIDTH;
            const remainingEnemies = getAliveEnemies().length;
            const arcadeStep = remainingEnemies === 1 && enemyDirection > 0
                ? ARCADE_LAST_ALIEN_RIGHT_STEP_X
                : ARCADE_RACK_STEP_X;

            return arcadeStep * scaleX;
        }

        function getEnemyDropStep() {
            return ARCADE_RACK_DROP_Y * (gameHeight / ARCADE_SCREEN_HEIGHT);
        }

        function getInvaderSoundDelay() {
            const remainingEnemies = getAliveEnemies().length;
            if (remainingEnemies === 0) {
                return Infinity;
            }

            for (let i = 0; i < ARCADE_SOUND_ALIEN_THRESHOLDS.length; i++) {
                if (remainingEnemies >= ARCADE_SOUND_ALIEN_THRESHOLDS[i]) {
                    return (ARCADE_SOUND_DELAYS[i] / ARCADE_INTERRUPT_HZ) * 1000;
                }
            }

            return (ARCADE_SOUND_DELAYS[ARCADE_SOUND_DELAYS.length - 1] / ARCADE_INTERRUPT_HZ) * 1000;
        }

        function updateExplosions() {
            explosions.forEach((explosion, index) => {
                explosion.x += explosion.vx;
                explosion.y += explosion.vy;
                explosion.vx *= 0.98;
                explosion.vy *= 0.98;
                explosion.size *= 0.95;
                explosion.timer--;

                if (explosion.timer <= 0 || explosion.size < 0.5) {
                    explosions.splice(index, 1);
                }
            });
        }

        function updateFireworks() {
            fireworks.forEach((firework, index) => {
                firework.timer--;
                firework.particles.forEach((particle) => {
                    particle.x += particle.vx;
                    particle.y += particle.vy;
                    particle.vy += particle.gravity;
                });

                if (firework.timer <= 0) {
                    fireworks.splice(index, 1);
                }
            });
        }

        function tintImage(image, color) {
            const offCanvas = document.createElement('canvas');
            const offCtx = offCanvas.getContext('2d');

            // Match image dimensions
            offCanvas.width = image.width;
            offCanvas.height = image.height;

            // Draw the base image
            offCtx.drawImage(image, 0, 0);

            // Apply tint color
            offCtx.globalCompositeOperation = 'source-atop';
            offCtx.fillStyle = color;
            offCtx.fillRect(0, 0, image.width, image.height);

            return offCanvas; // Return the tinted version
        }
        function initEnemies(level) {
            enemies = [];
            const baseY = 50 + level * 20; // Move enemies down by 20 pixels per level

            for (let row = 0; row < enemyRows; row++) {
                for (let col = 0; col < enemyCols; col++) {

        // Build a classic bunker silhouette with a center notch.
        function createShieldSegments(width, height) {
            const mask = [
                '001111111100',
                '011111111110',
                '111111111111',
                '111111111111',
                '111111111111',
                '111100001111',
                '111000000111',
                '111000000111'
            ];
            const columns = mask[0].length;
            const rows = mask.length;
            const cellWidth = width / columns;
            const cellHeight = height / rows;
            const gap = Math.max(1, Math.floor(Math.min(cellWidth, cellHeight) * 0.12));
            const segments = [];

            mask.forEach((rowMask, rowIndex) => {
                [...rowMask].forEach((cell, columnIndex) => {
                    if (cell === '1') {
                        segments.push({
                            x: columnIndex * cellWidth,
                            y: rowIndex * cellHeight,
                            width: cellWidth - gap,
                            height: cellHeight - gap,
                            intact: true,
                        });
                    }
                });
            });

            return segments;
        }

        function isColliding(a, b) {
            return a.x < b.x + b.width &&

                   a.y < b.y + b.height &&
                   a.y + a.height > b.y;

    // Create Scatter Explosion Effect
    function createExplosion(x, y) {
        const particleCount = 50; // Increase particle count for a larger scatter
        const explosionSpeed = 4; // Increase speed for more spread
        const explosionSize = 5; // Larger initial size for particles

        for (let i = 0; i < particleCount; i++) {
            const angle = Math.random() * Math.PI * 2; // Random angle (0 to 360 degrees)
            const speed = Math.random() * explosionSpeed + 1; // Random speed between 1 and explosionSpeed
            explosions.push({
                x: x,
                y: y,
                vx: Math.cos(angle) * speed, // Horizontal velocity
                vy: Math.sin(angle) * speed, // Vertical velocity
                size: Math.random() * explosionSize + 2, // Random size between 2 and explosionSize
                color: `hsl(${Math.random() * 360}, 100%, 50%)`, // Random colors for vibrant effect
                timer: Math.random() * 40 + 30 // Lifespan between 30 and 70 frames
            });
        }

        explosionSound.currentTime = 0;
        explosionSound.play();
    }
